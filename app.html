<!DOCTYPE html>
<html {{ HTML_ATTRS }}>
  <head>
    {{ HEAD }}
    <!-- 首屏遮罩：避免 CSS/JS 未就绪时出现无样式裸 HTML（FOUC） -->
    <style>
      #__nuxt-boot {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 1rem;
        background: linear-gradient(180deg, #f8f9fa 0%, #f1f3f5 100%);
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        transition: opacity 0.28s ease, visibility 0.28s ease;
      }
      #__nuxt-boot.__nuxt-boot--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #__nuxt-boot .__nuxt-boot-logo {
        font-size: 1.25rem;
        font-weight: 700;
        color: #495057;
        letter-spacing: 0.02em;
      }
      #__nuxt-boot .__nuxt-boot-bar {
        width: 160px;
        height: 3px;
        border-radius: 2px;
        background: #e9ecef;
        overflow: hidden;
      }
      #__nuxt-boot .__nuxt-boot-bar::after {
        content: '';
        display: block;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #ff9800, #fb8c00);
        border-radius: 2px;
        animation: __nuxt-boot-pulse 1s ease-in-out infinite;
      }
      @keyframes __nuxt-boot-pulse {
        0%,
        100% {
          transform: translateX(-20%);
          opacity: 0.7;
        }
        50% {
          transform: translateX(220%);
          opacity: 1;
        }
      }
    </style>
  </head>
  <body {{ BODY_ATTRS }}>
    <div id="__nuxt-boot" aria-live="polite" aria-busy="true">
      <span class="__nuxt-boot-logo">AID</span>
      <div class="__nuxt-boot-bar" aria-hidden="true"></div>
    </div>
    {{ APP }}
  </body>
</html>
